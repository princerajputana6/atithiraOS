# Self-hosted observability stack: OTel Collector -> Prometheus + Grafana.
# Run with: docker compose -f docker-compose.observability.yml up
#
# The app exports traces via OTLP/HTTP to the collector at :4318 (see
# packages/core-observability/src/tracing.ts, which defaults to this URL if
# OTEL_EXPORTER_OTLP_ENDPOINT is unset). The collector re-exposes metrics
# derived from those traces on :8889 for Prometheus to scrape.
services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4318:4318" # OTLP HTTP receiver
      - "8889:8889" # Prometheus exporter

  prometheus:
    image: prom/prometheus:v3.0.1
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
